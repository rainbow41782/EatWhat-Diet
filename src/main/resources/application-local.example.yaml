# Copy this file to application-local.yaml for local development.
# Do not commit application-local.yaml.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/JavaDiet?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: your_db_user
    password: your_db_password

meituan:
  chrome:
    binary-path: ""
    user-data-dir: .chrome-meituan-profile
    profile-directory: Default
    debugger-address: ""
    remote-debugging-port: 9222

llm:
  gateway:
    enabled: true
    base-url: https://api.deepseek.com
    api-key: your_llm_api_key
    model: deepseek-v4-flash

nutrition:
  fdc:
    api-key: your_fdc_api_key

map:
  tencent:
    enabled: false
    key: your_tencent_map_key
    keyword: 餐厅
    category-codes: 100000,101600,102000,102600,102800,161300,161500
    page-size: 20
    max-pages-per-category: 5
    max-results: 120
    auto-extend: true
    timeout-seconds: 8
